# Per-category cap. Each category is filled by Haiku-classified ads
# from across the brand pool, with a per-brand cap to force variety.
defaults:
  per_brand_cap: 30          # max ads pulled from each brand
  per_brand_per_category_cap: 4   # at most 4 ads from any one brand land in any one category
  total_cap_per_category: 50

# Categories — see definitions in this library's README.
# `key` is the canonical label the classifier returns.
categories:
  testimonial-review:
    key: testimonial-review
    description: |
      Customer voice + ratings. Hallmarks: 5-star ratings, named reviewer
      quotes, "real customer said…", screenshot-style reviews.
  features-and-benefits:
    key: features-and-benefits
    description: |
      Specs + outcomes. Iconned/bulleted feature list, "feature → benefit"
      callouts pointing to product. Product hero with radial callouts.
  us-vs-them:
    key: us-vs-them
    description: |
      Comparison with the alternative. Split layout, "old way vs new way",
      checkmarks vs Xs, direct competitor naming. Side-by-side layouts.
  before-and-after:
    key: before-and-after
    description: |
      Visual transformation. Two states — problem visible, then resolved.
      Split-photo or side-by-side comparison shots showing the change.
  promotion-and-discount:
    key: promotion-and-discount
    description: |
      Price-led offer. Big % off, urgency, price comparison ("was $X, now $Y").
      Numbers dominant, sale stickers, countdown framing.
  ugc:
    key: ugc
    description: |
      Authentic, creator/customer-shot feel. Phone-camera aesthetic, casual
      lighting, selfie angle, vertical framing, person addressing camera.
  facts-and-stats:
    key: facts-and-stats
    description: |
      Data-led authority. Big stat hero, "X% improvement", clinical study
      citations, scale numbers ("100,000+ women"). One number dominant.
  reasons-why:
    key: reasons-why
    description: |
      Numbered "X reasons" listicle. "5 reasons…", "Why we beat…", numbered
      bullets in the hero frame. Listicle is the primary visual element.
  media-and-press:
    key: media-and-press
    description: |
      Press logos + authority. "As seen in Forbes / NYT / Vogue" style with
      publication logos prominent. Validates via media coverage.
