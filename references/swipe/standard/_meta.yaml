library: standard
description: |
  Standard ad-type structural references — what each ad-type pattern looks like.
  Sourced from a hand-picked list of brands (user-favorited in Foreplay).
  Ads are classified into ad-type categories by our own Haiku-based classifier
  since Foreplay's built-in contentFilter doesn't fire on raw brand-page ads.

# WHAT THIS LIBRARY IS FOR: structural / compositional reference.
# Use to inform composition, layout, ad-type pattern selection — NOT copy
# psychology (use psychology/) or emotional angle.
purpose:
  signal: structural
  use_for:
    - composition
    - ad_type_pattern
    - layout
    - element_placement
    - structural_archetype
  not_for:
    - copy_psychology
    - emotional_angle
    - human_need_activation

source:
  type: foreplay-brand-aggregation
  classifier: claude-haiku-4-5-20251001
  filters:
    display_format: [image]
    live: true
    market_target: b2c
  min_classifier_confidence: 0.5

# 26 user-favorited brands. Each contributes ads which we classify
# individually into the category folders below.
