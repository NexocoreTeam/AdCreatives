name: Magic Spoon
colors:
  primary: ''
  secondary: ''
  background: '#FFFFFF'
typography:
  heading: Custom rounded display wordmark (proprietary); heading typeface on site
    appears to be a bold rounded sans — specific font name not extractable from CSS
  body: Clean sans-serif body type; specific font name not extractable from fetched
    HTML
visual_identity:
  aesthetic: Nostalgic childhood cereal box energy remixed for health-conscious adults
    — it feels like Saturday morning cartoons went to the gym and came back wearing
    ironic glasses.
  photography_style: Product-focused studio packaging shots; no lifestyle photography
    — the packaging IS the hero, treated as collectible art objects arranged in a
    cascading fan display.
  design_language: Maximalist flat-illustration cartoon with deliberate retro-naive
    charm — think mid-century children's book illustration colliding with modern DTC
    boldness. Dense, joyful, zero negative space on the front panel.
  typography_feel: 'Chunky rounded display type for the wordmark with a slightly bouncy
    baseline — not quite hand-lettered but has warmth. Stats typography is bold tabular
    sans, clinical in contrast to the illustration chaos. Two-speed typographic system:
    playful display vs. utilitarian data.'
  mascot_or_character: A stylized flat-illustrated girl with pink round goggle-glasses,
    dark ponytail, and a purple tank top riding a large green fantasy creature (moose
    or dragon-adjacent). Characters are limbless-simple in the Charley Harper / mid-century
    editorial illustration tradition. Not a fixed mascot — more of a recurring illustrated
    world.
  visual_references:
  - Kellogg's and General Mills 1970s–80s cereal box illustration energy, deliberately
    quoted and subverted
  - Charley Harper flat wildlife illustration — simplified forms, bold color fills,
    minimal linework
  - Ivan Brunetti / New Yorker cover cartoon flatness
  - Glossier and other DTC brands' use of a single dominant brand color per SKU
  - Mid-century Penguin paperback cover design — color-blocked, type-heavy spine
  mood: Playful, nostalgic, irreverent, confident, sugar-rush
  notable_visual_signatures:
  - One saturated hero color owns the entire front panel per SKU — the illustration
    floats on it with no background break
  - Floating cereal pieces (rings, loops) scattered as decorative elements around
    the illustration, treated like confetti
  - Bold nutrition callouts (13g, 0g, 4g) in a stacked pill/badge format — making
    health stats feel like a cheat code, not a warning label
  - Side panel spine used as a color-coded flavor identifier in the multi-box lineup
    — collectible set mentality
  - Circular badge reading 'Hold on to the Dream' with a brain graphic — brand philosophy
    treated as a wax-seal motif
  - The tagline 'Childlike Cereal for Grown-Ups' runs as a long vertical text block
    on the side panel in small caps — almost like a legal disclaimer used as a manifesto
  - Characters rendered in exactly 3-4 flat colors, no gradients, no shadows — hard
    Risograph-adjacent palette discipline within each illustration
  color_mood: Per-SKU hyper-saturated single-color dominance — hot bubblegum pink,
    royal purple, burnt sienna, deep cocoa brown, dusty periwinkle — each box a different
    candy-bright primary anchored by deep jewel secondaries. Collectively they read
    like a neon-soaked retro candy aisle.
tone: Playful and nostalgic but nutritionally confident — speaks like a smart friend
  who grew up on Saturday morning cartoons, not a nutritionist or a cereal box character.
  Permission-giving, never restrictive. Warm, irreverent, direct.
