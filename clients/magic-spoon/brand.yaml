  primary: ''
  secondary: ''
  background: '#FFFFFF'
typography:
  heading: Custom chunky geometric sans-serif (specific name unknown — similar feel
    to a modernized Cooper Black or Nunito Black)
  body: Unknown — clean sans-serif inferred from site rendering
visual_identity:
  aesthetic: A grown-up's lucid dream of the Saturday morning cartoon aisle. It's
    the playful, sugary nostalgia of childhood cereal filtered through the slick,
    hyper-functional lens of a modern DTC wellness brand.
  photography_style: Mixed. The treats and pastries use hyper-real, high-contrast
    studio food photography emphasizing texture and appetite appeal. The hero cereal
    line, however, relies entirely on illustration.
  design_language: Illustrative Maximalism on a Minimalist Grid. It uses a rigid,
    almost Swiss-inspired layout for information, but fills the space with surreal,
    character-driven illustrations and bold, flat color.
  typography_feel: Custom chunky geometric sans-serif. It's friendly, confident, and
    almost edible-looking, like a modern, more refined Cooper Black designed for Instagram.
  mascot_or_character: A rotating cast of anonymous, stylized human figures in dynamic
    poses with fantastical, oversized animal companions (e.g., a person riding a giant
    toucan-like bird). They represent the 'inner child' and the 'dream' state.
  visual_references:
  - Oatly's quirky illustration style meets the bold color-blocking of a brand like
    Starface or Graza.
  - Reimagined 90s cereal box nostalgia (think Froot Loops, Trix) for the macro-tracking
    generation.
  mood:
  - Playful
  - Surreal
  - Confident
  - Nostalgic
  - Energetic
  notable_visual_signatures:
  - Surreal, flat-style illustrations of characters riding giant, friendly creatures,
    often shaded with a distinct stipple/grain texture.
  - The hard vertical column of repetitive, benefit-driven text on the left side of
    the packaging ('High-Protein, Keto-Friendly, Gluten-Free...').
  - Using a single, intensely saturated, solid color as the entire background for
    each product flavor, creating a rainbow on the shelf.
  - For non-illustrated products, using crisp, high-flash studio photos of the food
    in cross-section to reveal fillings and texture.
  color_mood: High-saturation candy colors. Electric pink, bright yellow, royal purple,
    and sky blue used in bold, unapologetic monochromatic blocks.
tone: Playful and nostalgic with a confident wellness-fluent edge — Magic Spoon writes
  like a health-conscious millennial who knows nutrition matters but refuses to be
  lectured about it, leading with joy and craving rather than guilt or restriction.
audience:
  age_range: 25–45
  gender: Both male and female; fitness-adjacent skew may index slightly male but
    brand aesthetic appeals broadly
  interests:
  - keto / low-carb eating
  - high-protein diets
  - fitness and gym culture
  - podcast listening
  - nostalgia / pop culture
  - wellness
  - macro tracking
  - gluten-free eating
platforms:
- meta
- tiktok
press_mentions:
- 'Fast Company: ''Magic Spoon is an adult version of what you loved as a kid.'''
social_proof:
- 80,000+ five-star reviews (displayed in promo bar)
- Verified buyer review highlighting gluten-free appeal featured in mobile nav
- Happiness 100% Guaranteed (footer banner)
founded: '2019'
founder: Greg Sewitz and Gabi Lewis
mission: To create a guilt-free treat that tastes like the cereal you remember and
  that you can eat at any time of day — Saturday-morning-cartoon nostalgia upgraded
  for a 21st-century consumer.
tagline: Childhood Classics. Grown-Up Ingredients.
