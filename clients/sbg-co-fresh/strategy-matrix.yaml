matrix:
- persona_name: The Faithful Boy Mama
  persona_id: primary
  cells:
  - awareness_stage: unaware
    what_they_know: She knows she's a boy mom and she loves Jesus. She buys apparel
      occasionally but hasn't thought critically about the gap between what she's
      wearing and what she actually believes about her identity. She scrolls Instagram,
      double-taps matching family photos, and quietly wishes her wardrobe reflected
      her life more honestly — but she hasn't named this as a problem yet.
    what_they_dont_know_yet: That there is a brand built specifically for her — a
      faith-forward, boy-mama-specific, woman-of-color-owned label that was designed
      to fill the exact gap between 'Sunday best' and 'everyday mom uniform.' She
      doesn't know SBG Co. exists, and she doesn't know she's been settling.
    primary_angle: Interrupt her scroll with the mirror she didn't know she needed
      — show her what it looks like when a boy mom's wardrobe actually matches her
      faith and her family.
    hook_style: pattern-interrupt / aspirational visual stop
    example_hook: Nobody told me there was a shirt made for moms who love Jesus AND
      root for their wild little boys every single day.
    framework: bab
    creative_mechanic: Trojan Horse — opens as a relatable 'boy mom life' moment (muddy
      cleats, loud house, boys hanging off her) and reveals the apparel organically
      as part of the scene, not as a product demo. The brand enters through the emotion,
      not the pitch.
    proof_to_surface: Founder story — Whitney Vaughn, woman of color, built this from
      nothing in North Carolina since 2016. The brand IS the story.
    cta: See the collection
    funnel_placement: cold
    notes: 'Do not lead with product features or price. Lead with the life. The ''Wild
      Like My Curls'' and ''Kicks Over Chicks'' visual language can anchor this without
      needing to explain either product — let curiosity do the work. Representation
      matters here: showing a Black or mixed-race mom-and-son moment in the creative
      is both authentic to the brand and a meaningful pattern interrupt in a space
      that skews white.'
  - awareness_stage: problem_aware
    what_they_know: 'She knows she wants to dress herself and her boys in something
      that feels like them — faith-adjacent, boy-energy-appropriate, not stiff or
      preachy. She''s looked. She''s found the Christian bookstore section and felt
      nothing. She''s scrolled Etsy and bought something that arrived looking different
      from the photo. She has a vague, unresolved frustration: nothing out there feels
      both beautiful and right.'
    what_they_dont_know_yet: That the problem isn't her taste — it's the market. Most
      Christian apparel is either built for a 60-year-old church lady or mass-produced
      by someone who has never actually raised a boy. She doesn't yet know SBG Co.
      exists as the answer to exactly this complaint.
    primary_angle: Name her frustration out loud — validate that the gap is real,
      that she's not too picky, and that settling for soulless Amazon tees is not
      the only option.
    hook_style: empathy-opener / pain-callout
    example_hook: I spent way too long buying 'boy mom' shirts that had zero faith
      and Christian shirts that had zero personality. I was looking for both and couldn't
      find either — until this.
    framework: pas
    creative_mechanic: Talking Head Confession — founder or relatable mom-creator
      speaks directly to camera, naming the exact frustration in plain language before
      pivoting to the discovery moment. Feels like a text from a friend, not an ad.
    proof_to_surface: Featured on the Today Show — use this as the signal that this
      brand is not another Etsy shop. It's the real thing that actually got national
      recognition for doing what the market wasn't doing.
    cta: Explore SBG Co.
    funnel_placement: cold
    notes: This is the highest-leverage cold stage for this brand because the audience's
      pain is specific and nameable. The creative should feel like a sigh of relief
      — 'finally, someone gets it.' Avoid any creative that feels like a comparison
      ad at this stage; the goal is validation, not competition. The Today Show mention
      earns credibility without requiring the customer to already trust the brand.
  - awareness_stage: solution_aware
    what_they_know: 'She knows brands like SBG Co. exist — she may have seen a reel,
      a friend''s post, or a mention. She''s also aware of the Etsy-made-to-order
      category and Amazon''s boy-mom section. She''s in evaluation mode: is there
      a brand that does faith + boy-mom identity + real quality + a real story? She''s
      comparing options, even loosely.'
    what_they_dont_know_yet: That SBG Co. is categorically different from both Etsy
      and Amazon in ways that matter to her — it's made to order in North Carolina
      (not overseas), it's woman-of-color-owned (not a faceless brand), and it's been
      nationally featured (not just well-tagged on Instagram). She doesn't yet know
      that the brand she's vaguely aware of is actually the specific answer she's
      been looking for.
    primary_angle: Position SBG Co. not as another option in the category but as the
      brand that was built for her — when everything else is either mass-produced
      or misaligned, SBG Co. is the one that actually sees the boy-mama faith identity.
    hook_style: differentiation frame / 'there's a better way' opener
    example_hook: Amazon has the boy mom shirts. Etsy has the custom sets. But neither
      of them was made by a woman of color in North Carolina who built her whole brand
      around raising boys with faith. That's a different thing entirely.
    framework: fab
    creative_mechanic: Contrast Without Comment — side-by-side or sequential comparison
      of the 'alternatives' (generic, mass-produced, faceless) versus SBG Co. (specific,
      made-to-order, story-driven). Let the contrast do the persuading without editorializing.
      Ends on an SBG Co. product moment — no narration needed.
    proof_to_surface: Made to order in North Carolina, USA + woman-of-color founder
      since 2016 + Today Show feature. Stack all three as the differentiation proof.
      These are not marketing claims — they are facts the competition cannot replicate.
    cta: Shop the Boy Mama Collection
    funnel_placement: cold/warm
    notes: This stage should do real positioning work — not just vibes. The creative
      must make SBG Co.'s differentiators feel tangible, not aspirational. 'Made to
      order' should be tied to quality and intentionality, not just process. 'Woman-of-color-owned'
      should be shown (founder imagery, Whitney's face), not just stated. The Mamas
      Dude Checkered Tee and Kicks Over Chicks Sweatshirt are the right hero products
      to feature here — both speak directly to the boy-mama niche that distinguishes
      SBG Co. from generic Christian lifestyle brands.
  - awareness_stage: product_aware
    what_they_know: 'She knows SBG Co. She may have visited the site, saved an Instagram
      post, or been tagged in a friend''s photo. She''s seen the Kicks Over Chicks
      Sweatshirt or the Mamas Dude Checkered Tee. She''s interested — maybe even close.
      But she''s sitting on objections: the 14-day turnaround feels risky if she has
      an event coming, the price premium feels hard to justify compared to Amazon,
      or she''s been burned by small shop sizing before and can''t easily return a
      made-to-order item.'
    what_they_dont_know_yet: That the 14-day turnaround is a feature, not a bug —
      it means her item is being made specifically for her, not pulled off a shelf
      of generic inventory. She also doesn't know how many moms in her exact situation
      have ordered and loved it, or that the brand's quality is consistent enough
      to have earned national press.
    primary_angle: Collapse her objections one by one with social proof, size guidance,
      and framing that recontextualizes 'made to order' from a risk into a reason
      to buy.
    hook_style: objection-handling / social-proof anchor
    example_hook: I was nervous about the two-week wait and the no-return policy on
      a made-to-order shirt. Then it arrived. Worth every single day.
    framework: pastor
    creative_mechanic: 'Social Witness — real customer UGC or creator review that
      walks through the objection journey: ''I almost didn''t order because...'' followed
      by the reveal moment when the product arrived. The emotional payoff (unboxing,
      wearing it, the photo moment with her son) is the conversion proof.'
    proof_to_surface: Customer reviews and UGC — specifically any that reference quality,
      sizing accuracy, or made-to-order experience. Today Show feature as ambient
      trust signal. If available, surface specific customer quotes about the matching
      mom-and-son moment or the way the product photographed.
    cta: Order yours — allow 14 days for your made-to-order piece
    funnel_placement: warm/retargeting
    notes: 'The 14-day turnaround is the single biggest conversion objection for this
      brand and must be addressed proactively — not defensively. Frame it as craftsmanship,
      not delay. The custom quote sign (top SKU) and the Mamas Dude Tee are both made-to-order
      and have the same objection surface area, so creative built for this stage can
      work across both product types. Do not use urgency tactics that feel artificial
      — this audience is faith-aligned and values authenticity over pressure. Instead,
      use occasion-based urgency: ''Easter is 6 weeks out. Made-to-order takes 14
      days. Order now to wear it in time.'''
  - awareness_stage: most_aware
    what_they_know: She's ready. She's seen the product, she knows the brand, she's
      resolved her objections (or nearly so). She may be sitting in an abandoned cart,
      re-visiting the product page, or waiting for a nudge — a discount, a deadline,
      a final reason to click. She needs permission and a clear path forward.
    what_they_dont_know_yet: That this is the exact right moment to order — whether
      because a seasonal window is closing, because she's already been thinking about
      it for weeks, or because someone she trusts just told her to stop waiting. She
      may also not know if a bundle or occasion tie-in exists (e.g., matching mom-and-son
      Easter set) that would make the decision feel even more justified.
    primary_angle: Give her the final push with a direct, warm, occasion-anchored
      CTA that treats her purchase as an expression of her identity, not just a transaction.
    hook_style: direct close / occasion urgency / identity-confirmation
    example_hook: You've been thinking about it. The Mamas Dude Tee, the Kicks Over
      Chicks Sweatshirt for your son, the matching photo you've been planning. Made
      to order in North Carolina. Here's your sign — order today.
    framework: slap
    creative_mechanic: Implied Answer — the creative opens on the emotion she already
      has (the photo she wants, the moment she's imagining) and the product is the
      obvious, already-understood answer. No explanation needed. Just confirmation
      that she was right to want it.
    proof_to_surface: Customer photo (UGC) of a mom and son actually wearing the matching
      pieces — the image IS the proof. Support with the Today Show credibility badge
      and any urgency-relevant timing signal (seasonal deadline, processing time reminder).
    cta: Order now — made to order, ships in 14 days
    funnel_placement: retargeting
    notes: This audience does not need more information — they need confidence and
      a clear path. Keep the copy tight. Lead with the emotional payoff image (the
      matching moment, the photo, the church outfit), not with product specs. For
      abandoned cart sequences specifically, a warm, non-salesy tone consistent with
      the brand voice is critical — do not pivot to high-pressure language. A line
      like 'We saved your cart. Whenever you're ready, we'll make it for you.' is
      more on-brand than a countdown timer. If a seasonal window is relevant (Easter,
      4th of July, back to school), the 14-day lead time becomes a natural, non-manipulative
      urgency driver.
cross_stage_observations:
  highest_leverage_stages:
  - problem_aware — The pain is specific, nameable, and widely felt among the target
    persona. The market gap (faith + boy-mom identity + real quality) is real and
    demonstrable. Creative that names this frustration clearly will stop the scroll
    and earn trust before asking for anything.
  - product_aware — This is where purchases are being lost. The 14-day made-to-order
    turnaround is the primary conversion friction point. Creative that proactively
    collapses this objection with real customer social proof will have outsized impact
    on conversion rate relative to spend.
  - most_aware — The brand has a warm audience of past customers and engaged followers
    who are ready to buy again or complete a purchase they've been considering. Retargeting
    with occasion-anchored urgency (Easter, summer, back to school) is a high-ROI
    play given that this audience already trusts the brand.
  weakest_stages:
  - unaware — Cold reach is expensive and the brand's awareness is still building
    outside of its existing community. Without a large organic reach or influencer
    amplification, paid unaware content requires budget that may be better allocated
    to problem_aware and product_aware stages first.
  - solution_aware — The comparison positioning requires the creative to do more intellectual
    work and risks feeling like it's punching at competitors. This stage is valuable
    but needs careful execution to avoid sounding defensive rather than confident.
  ad_distribution_recommendation: For current brand scale, recommend a weighted distribution
    of approximately 40% problem_aware, 30% product_aware/retargeting, 15% solution_aware,
    10% most_aware retargeting, and 5% unaware. As the brand scales budget and builds
    a larger cold audience through organic and influencer channels, shift investment
    toward unaware (target 20-25%) to grow the top of funnel with personas who don't
    yet know SBG Co. exists. The most_aware retargeting budget should flex up seasonally
    (Easter, 4th of July, holiday) when occasion-based urgency makes the 14-day turnaround
    a conversion driver rather than a deterrent.
  category_specific_notes: Faith-forward apparel for moms operates on a trust-first
    buying psychology — this audience is deeply attuned to whether a brand is genuinely
    faith-aligned or using Christianity as an aesthetic. Every creative asset should
    feel like it was made by someone who actually believes what the brand says, not
    someone who researched the niche. Whitney Vaughn's face and founder story are
    among the brand's most powerful creative assets and should appear in paid content
    across all stages — not just the about page. The made-to-order model is simultaneously
    the brand's strongest quality signal and its biggest conversion barrier; every
    stage of the funnel should be doing some version of reframing this as craftsmanship
    rather than inconvenience. Seasonal moments (Easter, 4th of July, back to school,
    Christmas) are the brand's natural purchase windows and should anchor the most_aware
    and product_aware creative calendars. The Custom Quote sign (top SKU by volume)
    is underrepresented in this persona's awareness journey — it is a high-intent
    gift and home decor purchase that warrants its own funnel treatment separate from
    the apparel products featured here.
