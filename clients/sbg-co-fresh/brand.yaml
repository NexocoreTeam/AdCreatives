visual_identity:
  aesthetic: Modern Christian farmhouse for the aspirational suburban mom. It's the
    visual equivalent of a Joanna Gaines-designed home that smells like freshly baked
    bread and plays gentle worship music in the background.
  photography_style: Aspirational lifestyle UGC & clean product flat lays. Photos
    feel like they were taken by a mom-influencer on a sunny afternoon in a beautifully
    tidy home or on a family beach trip.
  design_language: Modern Farmhouse Minimalism. It's clean, type-driven, and uncluttered,
    but maintains a warmth and coziness that avoids feeling sterile.
  typography_feel: A mix of clean, geometric sans-serifs for statements and a quirky,
    hand-lettered script for personality. Think Madewell's simple type meets a crafty
    mom's Cricut font library.
  mascot_or_character: none
  visual_references:
  - Magnolia / Joanna Gaines' 'Modern Farmhouse' empire
  - The filtered, warm-haze aesthetic of Instagram family bloggers
  - Text-only apparel from brands like Madewell or The Daily Grace Co.
  - Target's Hearth & Hand collection
  mood:
  - Wholesome
  - Sincere
  - Gentle
  - Aspirational
  - Faithful
  notable_visual_signatures:
  - Short, centered, all-caps sans-serif phrases on apparel and decor.
  - Use of Comfort Colors or similar garment-dyed, lived-in t-shirt blanks.
  - Combining a single, playful script word with a clean sans-serif phrase.
  - Photography with a hazy, sun-drenched, slightly overexposed filter.
  - Staging products against neutral backdrops like shiplap walls, sandy beaches,
    or cozy, cream-colored furniture.
  color_mood: Earthy, garment-dyed tones. Think dusty brick red, faded denim, oatmeal,
    olive green, warm creams, and charcoal.
tone: Warm, sincere, and quietly proud — faith is worn as identity, not performance.
  The brand speaks like a close friend who loves Jesus, roots for her boys, and isn't
  afraid to be a little playful about the beautiful chaos of motherhood.
audience:
  age_range: 25–42
  gender: Female (primary); children as secondary beneficiary
  interests:
  - Christian faith and worship
  - Boy-mom identity and community
  - Matching family apparel moments
  - Farmhouse / modern home aesthetics
  - Supporting small / woman-owned businesses
  - Patriotism and American values
  - Motherhood humor and relatability
  - Curly hair / natural hair representation
