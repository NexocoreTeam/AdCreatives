name: Boy Mama Brittany
demographic: Woman, 28–38, suburban Southeast or Midwest, married with 1–3 boys ages
  1–9, household income $65K–$110K, homeowner or actively homebuying, likely one income
  or one primary earner
psychographic: Faith is her north star — not performative, but deeply personal and
  woven into how she dresses her kids and decorates her home. She is fiercely proud
  of being a boy mom and treats that identity like a badge. She curates her family's
  aesthetic intentionally — matching outfits for photos, a neutral-toned nursery,
  a home that could pass for a Magnolia Network set. She follows Christian mom influencers,
  shops small when she can, and would rather wait two weeks for something made with
  care than click-buy a commodity.
pain_points:
- pain: Nothing in the Christian apparel space speaks to the boy-mom experience specifically
    — it's all pink, girlish, or completely gender-neutral in a way that erases her
    identity
  intensity: high
  customer_language:
  - I can find a million cute girl things but good luck finding anything for boys
    that isn't just a boring blank shirt
  - Everything faith-based for kids looks like it belongs in a church nursery from
    2005
  source: auto_from_brand_context
- pain: Etsy matching sets are hit-or-miss — she's been burned by thin fabric, wrong
    sizing, colors that don't match the listing photo, or shops that disappear after
    one order
  intensity: high
  customer_language:
  - I ordered a matching set off Etsy and it looked nothing like the pictures. Total
    waste.
  - The quality is so inconsistent. You never know what you're actually getting until
    it shows up.
  source: auto_from_brand_context
- pain: She wants something that combines her faith and her boy-mom pride in one product
    — and that combination basically doesn't exist anywhere else
  intensity: high
  customer_language:
  - I either find something with a Bible verse or something that says 'boy mom' —
    never both at the same time
  - Why is it so hard to find something that actually gets my life?
  source: auto_from_brand_context
- pain: She feels vaguely guilty spending money on herself (a mom tee) when family
    finances are tight, so the product has to feel worth it — meaningful, not frivolous
  intensity: medium
  customer_language:
  - I don't need another basic tee. If I'm buying something for myself it has to mean
    something.
  source: auto_from_brand_context
desires:
- desire: A wardrobe — for herself and her boys — that tells the world who she is
    without her having to explain it
  customer_language:
  - I want to wear my faith and my boy-mom life on my sleeve. Literally.
  - I want people to see us and just get it.
- desire: A perfectly coordinated matching moment she can photograph and share — something
    that looks effortless but clearly wasn't accidental
  customer_language:
  - I want that photo where we all match and it looks like a magazine but I didn't
    spend all morning fighting with Amazon returns to get it
  - Matching outfits are my love language
- desire: To support a small, woman-owned, faith-driven business — buying from SBG
    Co. is itself an act of values alignment
  customer_language:
  - I'd rather give my money to a real person who built something than another Amazon
    seller
  - I love that Whitney built this. It makes the product mean more.
objections:
- Made to order means I'll be waiting — will it arrive in time for Easter / the 4th
  / my son's birthday photos?
- The price is higher than Amazon or a generic Etsy shop — I need to believe the quality
  justifies it before I commit
- I've been burned by small shops before. How do I know this is reliable?
- Sizing for toddlers and boys is unpredictable — what if it doesn't fit and returns
  are a hassle?
current_solutions:
- Etsy custom matching sets — inconsistent quality, no brand story, unreliable sellers
- Amazon generic 'boy mom' tees — no faith component, mass-produced, zero soul
- DIY Cricut/HTV on blank shirts — creative but time-consuming and not as polished
- Generic Christian bookstore apparel — faith-forward but aesthetically dated and
  boy-mom-blind
trigger_events:
- She sees a boy-mom friend post a coordinated family photo on Instagram wearing matching
  'Kicks Over Chicks' tees and immediately asks where they're from
- Easter, 4th of July, or a family beach trip is coming up and she wants a matching
  set that photographs beautifully
- She tries to find a 'boy mom' faith tee on Amazon, gets garbage results, and types
  'Christian boy mom shirt' into Google in frustration
- Her son starts wearing a personality — obsessed with sneakers, chaotic, all boy
  — and she suddenly wants to dress him in something that captures exactly who he
  is
- She discovers Whitney Vaughn's story as a Black woman founder in the Christian lifestyle
  space and feels genuinely drawn to support it
awareness_level: product_aware
language_patterns:
- 'Heavy use of mom-culture shorthand: ''boy mom,'' ''all boy,'' ''feral,'' ''chaos,''
  ''my people,'' ''this is us'''
- 'Faith woven into casual speech: ''so grateful,'' ''blessed,'' ''God knew,'' ''this
  was meant for us'''
- 'Enthusiastic affirmations in purchase context: ''obsessed,'' ''need this,'' ''immediately,''
  ''shutup'''
- 'Playful self-deprecation about boy-mom life: ''send help,'' ''pray for me,'' ''why
  are boys like this'''
- 'Community language: ''my boy mamas,'' ''for the moms in the trenches,'' ''you know
  you have boys when'''
