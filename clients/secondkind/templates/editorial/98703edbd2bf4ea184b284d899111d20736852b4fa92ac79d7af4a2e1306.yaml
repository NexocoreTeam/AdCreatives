template_prompt: 'Image 1 is the actual product — replicate it exactly.


  Create an ad with a 4:5 aspect ratio and a solid, warm off-white [BACKGROUND]. The
  composition is a single vertical column with all elements centered.


  At the top, include a pill-shaped banner in a soft [ACCENT] color (like pale yellow).
  Inside this banner, place the [BENEFIT] text in a dark, clean, all-caps sans-serif
  font.


  Below the banner, create a multi-line [HEADLINE]. The first and last lines should
  be a large, bold, dark sans-serif font. The middle line(s) should be a smaller,
  contrasting, elegant italic serif font.


  In the middle of the canvas, place a single, high-fidelity hero shot of the [PRODUCT].
  It should be shown at a slight diagonal angle with a subtle drop shadow to make
  it pop. The [BRAND] name should be embossed onto the product''s surface.


  Below the product, add the [SUBHEAD] text in a clean, dark sans-serif font, smaller
  than the headline.


  At the very bottom of the ad, include any necessary disclaimer text'
