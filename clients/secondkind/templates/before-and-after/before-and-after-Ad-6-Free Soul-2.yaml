template_prompt: 'Image 1 is the actual product — replicate it exactly.


  Create a 1:1 square ad with a two-column layout against a solid [BACKGROUND] color
  (e.g., warm off-white).


  LEFT COLUMN:

  - At the top, place the [HEADLINE] in a large, elegant, dark-colored serif font,
  broken into multiple lines.

  - Directly below the headline, add a [SUBHEAD] in a smaller, clean sans-serif font.

  - Below the subhead, create a pill-shaped callout with a light-colored background
  and thin border. Inside, place the [BENEFIT] text in an all-caps, dark sans-serif
  font.

  - In the lower-left area, place a hero shot of the [PRODUCT], standing upright with
  a soft drop shadow.

  - At the very bottom, create a wide, pill-shaped call-to-action button using the
  [ACCENT] color. The button should contain the [CTA] in all-caps white text.


  RIGHT COLUMN:

  - Create a vertical stack of two lifestyle photos, each contained within a shape
  with rounded corners.

  - The TOP photo is the "after" shot: a bright, attractive close-up showing the desired
  result (e.g., healthy, polished nails).

  - The BOTTOM photo is the "before" shot: a close-up showing the problem the product
  solves (e.g., brittle, unpolished nails).'
