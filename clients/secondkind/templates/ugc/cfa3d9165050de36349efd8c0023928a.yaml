template_prompt: 'A user-generated content (UGC) style photo taken from a first-person
  perspective. The background is a slightly out-of-focus, authentic [BACKGROUND] like
  a home interior.


  In the center of the frame, a person''s hand holds two [PRODUCT] containers side-by-side.
  The shot should feel casual, authentic, and handheld.


  GRAPHIC OVERLAYS:

  1. At the top of the image, place a simulated social media comment or question sticker.
  It should be a white rounded rectangle with a small, circular user profile picture
  on the left. The sticker contains the [HEADLINE] text acting as a question. Below
  the headline, include a smaller line of text like "Replying to [DETAILS]".

  2. Create two benefit callouts as rounded rectangular text boxes in a bright [ACCENT]
  color. Each callout should point to one of the products and contain a short [BENEFIT]
  in a clean sans-serif font.'
