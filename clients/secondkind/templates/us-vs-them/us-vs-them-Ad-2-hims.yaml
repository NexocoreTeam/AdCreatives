template_prompt: 'Image 1 is the actual product — replicate it exactly.


  Create a 1:1 aspect ratio ad with a minimalist and clean aesthetic on a light [BACKGROUND]
  color.


  At the top of the ad, centered, place the [HEADLINE] in a large, bold, dark sans-serif
  font, spanning two lines. Highlight a specific [STAT] and [BENEFIT] within the headline
  using the [ACCENT] color.


  Below the headline, feature two side-by-side vertical panels with large rounded
  corners.


  The left panel represents the brand:

  - Background: Solid [ACCENT] color.

  - Top: The [BRAND] name in a white, lowercase, stylish serif font.

  - Middle: A clean, studio-lit or 3D rendered photo of the [PRODUCT], vertically
  centered in the panel. The [PRODUCT] itself should have the [BRAND] name on it.

  - Bottom: A single dollar sign "$" in a large, white, serif font to symbolize low
  cost.


  The right panel represents competitors:

  - Background: Solid neutral gray color.

  - Top: The word "Others" in a white, sans-serif font.

  - Middle: A similar but generic-looking product, also studio-lit, vertically centered.

  - Bottom'
