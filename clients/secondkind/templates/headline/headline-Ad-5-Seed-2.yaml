  LAYOUT:

  The right half of the ad is dominated by a large, symbolic lifestyle photo of [DETAILS]
  (e.g., stacked stones symbolizing balance).

  The left half of the ad contains all the text, the product, and a promotional callout.


  TEXT HIERARCHY:

  All text is placed on the left side, using a clean sans-serif font in a primary
  [ACCENT] color.

  - In the upper-left, place the large, bold [HEADLINE].

  - Below the headline, add the smaller [SUBHEAD] explaining the problem or context.

  - Below the subhead, create a pill-shaped button filled with the primary [ACCENT]
  color. This button contains the [CTA] text in a contrasting light color (e.g., white).


  PRODUCT & PROMOTION:

  - In the bottom-left corner, place a studio shot of the [PRODUCT]. The [BRAND]'
