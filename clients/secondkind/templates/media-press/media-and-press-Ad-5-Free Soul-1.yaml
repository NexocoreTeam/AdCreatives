template_prompt: 'Image 1 is the actual product packaging — replicate it exactly.


  Create a 1:1 square ad with a soft, solid [BACKGROUND] color.


  On top of the background, create a repeating pattern of the [PRODUCT] image. Arrange
  the products diagonally across the canvas, as if they are falling from the top-left
  to the bottom-right. The products should be photographed in a clean, studio style,
  but slightly out of focus to create a textured, branded backdrop.


  In the center of the image, place a large, vertically-oriented rectangular text
  box with a solid [ACCENT] color fill (e.g., a cream or off-white). Give this box
  a very subtle drop shadow to lift it off the background.


  Inside this central box, lay out the text to mimic an editorial feature:

  1.  At the very top, centered, add the [DETAILS] text in a small, all-caps, sans-serif
  font (e.g., "WELLNESS FEATURE" or "AS SEEN IN").

  2.  Below that, place the [HEADLINE]. It should be large, multi-line, and set in
  a high-contrast, elegant serif font. Use sentence case or title case, and a dark
  color that provides strong contrast against the accent box.

  3.  Next, add the [BODY] copy. This should be a 2-3 sentence paragraph in a clean,
  legible sans-serif font, smaller than the headline.

  4.  At the bottom of the box, add a final [BENEFIT] callout, also in the sans-serif
  font, summarizing the key ingredients or a core outcome.


  There is no separate brand logo; branding is communicated through the product packaging
  in the background pattern.

  '
description: Use this template to present a product story in an advertorial format,
  framing it as a featured article. The repeating product background creates a strong
  brand presence while the central text box educates the audience on a unique value
  proposition.
platforms:
