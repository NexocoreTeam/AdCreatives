- name: Gut & Mood Bundle Subscription — 25% Off
  type: subscription
  details: Gut and Mood Balance Bundle available as a subscription with 25% discount
    (implied by brand context stating 25% off subscription for bundle, vs 15% off
    one-time). Subscription cart link for both products with selling plans 4626055355
    and 4625924283 visible in source.
  where_found: https://secondkind.com (homepage Subscribe & Save widget showing dual
    subscription option); cart URLs in page source
  on_brand: true
  notes: 25% subscription bundle is the highest-value offer in the catalog and should
