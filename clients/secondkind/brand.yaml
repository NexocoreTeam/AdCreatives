typography:
  heading: High-contrast serif (Bodoni or Didot style)
  body: Clean geometric sans-serif
visual_identity:
  aesthetic: A clean, modern apothecary for the scientifically-minded. It feels less
    like a wellness trend and more like a prescription from a very stylish, minimalist
    doctor.
  photography_style: Minimalist studio photography. Clean, brightly lit product shots
    on a seamless off-white or light grey background with soft, grounding shadows.
  design_language: Editorial Minimalism. It uses a strict grid and typographic hierarchy
    like a science journal, but softened with organic shapes and premium materials.
  typography_feel: Classic high-contrast serif (think Bodoni or Didot) for headings,
    paired with a clean, geometric sans-serif for body copy and functional text.
  mascot_or_character: None. Abstract molecular/cellular circle clusters act as the
    primary graphic device.
  visual_references:
  - The clinical-chic packaging of Aesop or The Ordinary.
  - Abstracted scientific diagrams, like cell cultures in a petri dish or molecular
    models.
  mood:
  - Calm
  - Scientific
  - Trustworthy
  - Understated
  - Premium
  notable_visual_signatures:
  - An abstract graphic of overlapping, variously-sized circles representing a biome
    or cellular cluster. The opacity varies, creating depth.
  - Dark amber glass jars with glossy black lids, giving an apothecary feel.
  - A single, desaturated accent color (e.g., marigold orange) used within the circle
    cluster to differentiate SKUs.
  - The typographic pairing of an elegant, high-contrast serif headline with a functional,
    lowercase sans-serif for descriptions.
  color_mood: Muted clinical neutrals (taupe, off-white, black) with a single, targeted
    warm accent color per product.
tone: Confident and science-forward with accessible warmth — SecondKind writes like
  a credible insider who wants to educate, not impress. Short declarative sentences,
  contrast structures, and a recurring emphasis on bioavailability and real-world
  results. All health claims carry FDA asterisks.
