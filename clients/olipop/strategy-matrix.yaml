matrix:
- persona_name: The Guilty Soda Lover
  persona_id: primary
  cells:
  - awareness_stage: unaware
    what_they_know: They drink soda occasionally and feel vaguely bad about it, or
      they swapped to sparkling water and consider the matter settled. They haven't
      connected gut health to their daily drink choices at all — prebiotics are a
      supplement-aisle concept, not a soda-aisle one.
    what_they_dont_know_yet: That the soda-versus-health tradeoff is a false binary.
      A soda exists that actually feeds the microbiome with 9g of plant fiber and
      real botanical ingredients — and it tastes like the root beer or cola they grew
      up on.
    primary_angle: The soda you loved as a kid didn't have to be the villain — the
      formula was just wrong.
    hook_style: pattern-interrupt / nostalgic-reveal
    example_hook: Nobody told you soda could have 9 grams of fiber. Honestly, nobody
      told us either — so we made it.
    framework: bab
    creative_mechanic: 'Nostalgic B-roll Reframe — open on warm, slow-motion footage
      of a classic soda being poured (the sound, the fizz, the visual ritual), then
      cut to a single OLIPOP can in the same shot. Voice-over: ''What if soda was
      always supposed to taste this good AND do something good?'' No clinical language.
      Let the visual do the before/after work silently.'
    proof_to_surface: 'OLIPOP''s OLIPOP Blend: cassava root, chicory root, Jerusalem
      artichoke, nopal cactus, marshmallow root — 9g plant fiber per can. Leads with
      ingredients from nature, not a lab.'
    cta: Discover OLIPOP
    funnel_placement: cold
    notes: Do NOT open with gut health or prebiotics — this audience hasn't made that
      mental connection yet. Lead with soda nostalgia and let the functional reveal
      land second. Tone must stay warm and playful, never preachy. OLIPOP's aesthetic
      edge is the retro-groovy can design — use it prominently as a visual pattern
      interrupt in a feed full of clinical wellness content.
  - awareness_stage: problem_aware
    what_they_know: 'They know they''re drinking too much regular soda, or they''re
      unsatisfied with the sparkling water swap they''ve made. They feel the tension:
      soda tastes good, health matters, nothing in between has felt like a real solution.
      Diet soda feels sketchy. Plain sparkling water feels like a consolation prize.'
    what_they_dont_know_yet: That OLIPOP exists as a third category — not a health
      supplement, not a compromise, but a real soda experience with 2–5g of sugar
      and functional gut health ingredients baked into the formula.
    primary_angle: You gave up soda trying to be healthier. You shouldn't have had
      to.
    hook_style: empathy-callout / story-opener
    example_hook: You switched to sparkling water. You told yourself it was fine.
      It wasn't fine, was it.
    framework: pas
    creative_mechanic: 'Talking Head Confession — a relatable person (UGC-style, not
      overly polished) describes the exact ritual they miss: cracking a cold Coke
      at a barbecue, root beer with a burger, cream soda on a Friday night. They''re
      not dramatic — just honest. Then they hold up an OLIPOP Classic Root Beer or
      Vintage Cola and say ''This is the first time in two years I actually look forward
      to what I''m drinking.'' No list of benefits. One felt truth.'
    proof_to_surface: OLIPOP has 2–5g of sugar versus 39g in a standard Coca-Cola.
      The swap is real, not symbolic. Surface this as a felt benefit ('same ritual,
      a fraction of the sugar') rather than a stat dump.
    cta: Try It for Yourself
    funnel_placement: cold
    notes: This is likely OLIPOP's highest-volume cold audience — people actively
      searching for soda alternatives or consuming wellness content about cutting
      sugar. The emotional register here is validation, not education. Don't explain
      prebiotics yet. The hook is 'we see you and we solved it.' Classic Root Beer
      and Vintage Cola are the right hero products at this stage — they carry the
      maximum nostalgia payload.
  - awareness_stage: solution_aware
    what_they_know: They know 'healthier soda' is a category. They may have seen Poppi
      on TikTok, noticed OLIPOP at Whole Foods, or heard a friend talk about prebiotic
      drinks. They're exploring options but haven't committed — and they carry skepticism
      about whether any of these actually taste like real soda.
    what_they_dont_know_yet: 'Why OLIPOP''s formula is meaningfully different from
      Poppi and other competitors, and specifically why the OLIPOP Blend (plant fiber
      + prebiotics + botanicals) is more robust than ACV-based alternatives. Also:
      that OLIPOP''s flavor library was built to replicate the exact nostalgia of
      classic American soda, not just gesture at it.'
    primary_angle: Not all prebiotic sodas are built the same — OLIPOP is the one
      that actually tastes like soda and actually feeds your gut.
    hook_style: comparison-contrast / category-education
    example_hook: There are prebiotic sodas that taste like compromise. And then there's
      the one that made it onto the Today Show and sold out at Target.
    framework: fab
    creative_mechanic: 'Side-by-Side Without Comment — show two cans (OLIPOP vs. a
      generic ''healthy soda'' silhouette) with ingredient panels visible. OLIPOP''s
      reads: cassava root, chicory root, Jerusalem artichoke, nopal cactus, marshmallow
      root. The other reads: apple cider vinegar, stevia, natural flavors. No voiceover
      needed. Then cut to someone taking a sip of OLIPOP Classic Root Beer and their
      face doing all the talking. End card: ''9g plant fiber. 2–5g sugar. Tastes like
      the real thing.'''
    proof_to_surface: Today Show feature; wide retail presence at Whole Foods, Target,
      Kroger (signals mainstream legitimacy, not fringe wellness); the OLIPOP Blend
      specificity (named plant-based fiber sources) vs. vague 'prebiotic' language
      from competitors.
    cta: See What's Inside
    funnel_placement: cold_warm
    notes: This is the stage where OLIPOP can pull away from Poppi without ever naming
      them. The differentiator to emphasize is formula depth (plant fiber blend vs.
      ACV) and flavor authenticity (classic soda nostalgia vs. trend-chasing). Avoid
      making this feel like a head-to-head attack ad — OLIPOP's tone is too warm for
      that. Let the ingredient story and the taste reaction do the competitive work
      implicitly.
  - awareness_stage: product_aware
    what_they_know: 'They know OLIPOP exists. They''ve probably seen it in a store,
      scrolled past an ad, or heard about it. They haven''t bought yet — most likely
      because of one of four objections: it won''t taste like real soda, it''s too
      expensive, they''ve been burned by other ''healthy'' versions before, or they
      don''t understand what prebiotics actually do for them.'
    what_they_dont_know_yet: That the taste objection collapses on first sip. That
      at roughly $2.50 per can they're getting functional gut support that would cost
      multiples more in supplement form. That over 1,000 five-star reviews on the
      site validate the taste claim from people who started with the exact same skepticism.
    primary_angle: Every objection you have about OLIPOP is exactly what we expected
      — here's what happened when skeptics tried it anyway.
    hook_style: objection-first / social-proof-cascade
    example_hook: '''I was 100% sure it would taste like a health drink. I was wrong.''
      — every OLIPOP skeptic, after their first Classic Root Beer.'
    framework: pastor
    creative_mechanic: 'Skeptic-to-Convert UGC Stack — compile 3–4 short first-reaction
      clips from real customers, each opening with their specific objection (''I thought
      it would taste fake,'' ''I figured it was just sparkling water with marketing,''
      ''I couldn''t justify the price'') and ending with their genuine reaction after
      trying it. No scripting, no polish. Close with a single product shot: OLIPOP
      Classic Root Beer or Vintage Cola, with the ''Microbiome Approved'' badge and
      the star rating visible. The format does the persuasion work; OLIPOP just curates
      the proof.'
    proof_to_surface: 5-star review volume on drinkolipop.com; Today Show feature
      (mainstream credibility anchor); retail availability at Target and Whole Foods
      (accessibility and trust signal — 'if Target carries it, it's real'); specific
      review language about taste ('tastes exactly like the real thing' style verbatims).
    cta: Read the Reviews / Try Your First Case
    funnel_placement: warm_retargeting
    notes: Price objection should be addressed indirectly, not defensively — frame
      value through the functional ingredient angle ('9g plant fiber per can; a prebiotic
      supplement alone would cost you more per serving') rather than discounting or
      apologizing. If OLIPOP is running a variety pack promotion, this is the right
      stage to surface it — trial risk feels lower with a variety pack than committing
      to one flavor. Classic Root Beer is the safest first-flavor recommendation for
      this persona because it carries the strongest nostalgia hook.
  - awareness_stage: most_aware
    what_they_know: They know OLIPOP, they want it, they've probably had it before
      or added it to their cart. They need a final reason to act now — a nudge, an
      offer, a seasonal hook, a flavor they haven't tried, or simply a reminder that
      the thing they already like is right there waiting.
    what_they_dont_know_yet: About new flavors (Raspberry Sherbet, Blackberry Vanilla),
      ongoing offers (Shirley Temple at 30% off), or variety pack options that make
      stocking up feel smart rather than indulgent.
    primary_angle: You already know OLIPOP is your soda. Stock the fridge.
    hook_style: direct-offer / new-flavor-reveal
    example_hook: Raspberry Sherbet just dropped and it tastes exactly like summer
      in a can. Your fridge is about to get a lot more fun.
    framework: slap
    creative_mechanic: 'Flavor Reveal with Lifestyle Payoff — fast, punchy, visually
      led. Open on a single OLIPOP can (Raspberry Sherbet or Blackberry Vanilla) being
      pulled from a fully stocked, aesthetically organized fridge. No long setup.
      Voiceover or text overlay: the flavor name, one evocative descriptor (''like
      a sherbet push-pop, but make it grown-up''), and the offer or variety pack CTA.
      Ends on brand: groovy retro illustration style, warm palette, the sound of a
      can cracking open. This is a 10-second ad, not a 30-second one.'
    proof_to_surface: New flavor launches (Raspberry Sherbet, Blackberry Vanilla called
      out as fan favorites in site announcement bar); Shirley Temple 30% off promotional
      pricing; Variety Pack framing (Classic Soda, Fruity Fun, Favorites) for stocking-up
      behavior; implied social proof via 'fan favorite' language.
    cta: Shop Now / Stock Your Fridge
    funnel_placement: retargeting
    notes: This audience does not need education or persuasion — they need permission
      and occasion. Make it easy and make it fun. Lean into OLIPOP's retro-groovy
      aesthetic at full volume here — this is the stage where the brand's visual identity
      can do the heaviest lifting with no explanatory copy needed. Seasonal and limited-edition
      angles (SpongeBob Pineapple Paradise, Shirley Temple) work especially well at
      this stage as urgency drivers without resorting to aggressive discount language.
cross_stage_observations:
  highest_leverage_stages:
  - problem_aware — This is where the largest cold audience lives. Health-conscious
    adults actively trying to reduce sugar or find a soda alternative represent a
    massive, targetable, scroll-ready audience. OLIPOP's emotional hook (you gave
    up soda trying to be healthy; you shouldn't have had to) is both true and deeply
    resonant here. Volume of creative investment should be highest at this stage.
  - product_aware — The taste objection is OLIPOP's biggest conversion blocker, and
    it collapses on first sip. The gap between 'aware but unconverted' and 'bought'
    is almost entirely a trust gap that UGC and social proof close efficiently. High
    ROI on creative investment at this stage because the persuasion work is done by
    customers, not the brand.
  weakest_stages:
  - unaware — OLIPOP's product is inherently easier to sell to people who already
    feel the tension between wanting soda and wanting to be healthy. Reaching truly
    unaware audiences (people who haven't connected gut health to their daily drink
    ritual at all) requires higher spend and more patience. The category education
    burden is real.
  - solution_aware — This stage requires OLIPOP to differentiate from Poppi and other
    prebiotic sodas without triggering brand defensiveness or feeling clinical. The
    OLIPOP Blend is a genuine differentiator but requires nuanced communication —
    ingredient lists don't convert; felt benefits do. Creative execution here is harder
    to get right.
  ad_distribution_recommendation: Allocate roughly 40% of creative volume and budget
    to problem_aware (largest cold audience, strongest emotional hook, clearest path
    to trial), 25% to product_aware (high ROI on UGC-driven objection handling), 20%
    to most_aware (retention, repeat purchase, new flavor adoption), 10% to solution_aware
    (competitive differentiation, category education), and 5% to unaware (brand equity,
    funnel seeding). If budget is constrained, deprioritize unaware first — OLIPOP's
    retail presence (Target, Whole Foods) does meaningful unaware work passively.
  category_specific_notes: 'OLIPOP competes in a noisy, fast-moving functional beverage
    category where taste credibility is the primary purchase barrier and aesthetic
    differentiation is table stakes. Three category-specific dynamics to build into
    creative strategy: (1) Taste proof must be visceral and human, not statistical
    — a single genuine reaction shot outperforms any ingredient callout for conversion
    at cold stages. (2) Nostalgia is OLIPOP''s genuine structural advantage over Poppi
    and every other competitor in the space — Classic Root Beer and Vintage Cola are
    not just flavors, they are the brand''s proof of concept that healthy soda doesn''t
    mean compromised soda. These two SKUs should anchor acquisition creative even
    as newer flavors (Raspberry Sherbet, Blackberry Vanilla) anchor retention and
    newness creative. (3) The gut health benefit is best communicated as a silent
    ingredient story rather than a medical claim — ''plant fiber from cassava root
    and chicory root'' lands warmer and more credibly than ''supports your microbiome.''
    OLIPOP''s ''Microbiome Approved'' badge on-can does this elegantly; creative should
    borrow the same tone.'
