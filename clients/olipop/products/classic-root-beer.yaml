unique_mechanism: OLIPOP uses a prebiotic blend of plant fiber and botanicals to feed
  the good bacteria in your gut — delivering the sensory experience of classic soda
  (the fizz, the sweetness, the familiar flavor) through a formula built on functional
  ingredients rather than empty sugar. Classic Root Beer specifically achieves its
  signature taste through a botanically inspired blend, including sweet birch, that
  replicates the traditional root beer bite and creaminess without relying on conventional
  soda formulation.
