  centered, dramatic studio lighting 2. Extreme Macro Detail — close-up of product
  texture and craftsmanship 3. Dynamic Interaction — product in use, motion energy
  4. Minimal Sculptural — product as art object, geometric shadows 5. Lifestyle Context
