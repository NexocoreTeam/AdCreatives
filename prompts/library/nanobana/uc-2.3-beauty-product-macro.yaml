  behind it. Pure white seamless background.


  Camera: wide-close macro perspective (24-35mm feel), f/2.0-f/2.8, shallow DOF.

  Lighting: clean high-key studio, soft shadows, crisp specular highlights on product.

  Subject: [HAIR DESCRIPTION], [MAKEUP coordinating with product color].

  Hands: both hands framing and holding the product close to lens. [NAIL COLOR matching
  product]. Perfect hands, five fingers each.

  Product: [EXACT PRODUCT DESCRIPTION from reference images — shape, color, label
  text, branding].


  Quality: ultra realistic skin texture, no plastic smoothing, natural eye catchlights,
  product label readable and correct, high-end magazine beauty advertising look.


  3:4 aspect ratio.'
