template_prompt: 'Use the attached images as brand reference. Match the exact product
  design precisely.


  Ultra-photoreal editorial beauty macro shot. A [PERSON DESCRIPTION matching target
  demographic] holds [YOUR PRODUCT] extremely close to the camera with dramatic perspective.
