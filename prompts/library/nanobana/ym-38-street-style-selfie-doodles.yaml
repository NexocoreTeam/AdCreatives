id: ym-38-street-style-selfie-doodles
name: Street Style Selfie with Doodle Annotations
category: educational
description: Casual urban selfie with hand-drawn white doodle annotations labeling
  outfit elements. Great for product callouts.
product_types:
- apparel
- fashion
- accessories
audience_fit:
- solution_aware
- product_aware
funnel_stage: consideration
aspect_ratios:
- '4:5'
- '9:16'
tags:
- selfie
- doodles
- annotations
- callouts
- street-style
