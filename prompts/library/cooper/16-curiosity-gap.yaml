  two lines in enormous heavy-weight bold all-caps sans-serif reading "[BAIT PHRASE]",
  followed by a smaller sentence-case line reading "[REVEAL]". Closing quotation marks
  and "[ATTRIBUTION]" in regular weight. Left side bottom: [YOUR PRODUCT] at a slight
  angle with [PRODUCT DETAILS]. To the left of the product: a [TRUST BADGE]. Right
  side bottom: [NUMBER] filled [ACCENT COLOR] stars and bold text reading "[REVIEW
  COUNT] 5-Star Reviews". 1:1 aspect ratio.'
