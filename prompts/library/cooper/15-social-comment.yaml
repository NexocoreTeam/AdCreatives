template_prompt: 'Use the attached images as brand reference. Match the exact product
  design and colors precisely. Create: a static ad on a clean white background. Top:
  oversized bold black sans-serif headline reading "[HOOK HEADLINE]" with [EMOJI]
  at the end. Center: a social media comment card with light gray rounded-rectangle
  background containing: a small circular profile avatar (top left), bold name "[REVIEWER
  NAME]", and a multi-sentence review in regular-weight sans-serif: "[FULL REVIEW
  TEXT, 3-4 sentences, conversational and emotional]". Small gray timestamp "[TIMESTAMP
  like 2d]" below the comment. Bottom center: [YOUR PRODUCT] photographed at a slight
  angle on white, soft studio lighting. No brand logo. No stars. The rawness is the
  point. 1:1 aspect ratio.'
source: Alex Cooper / Adcrate (adcrate.notion.site)
platforms:
- meta
- tiktok
