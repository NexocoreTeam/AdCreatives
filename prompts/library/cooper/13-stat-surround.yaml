id: cooper-13-stat-surround
name: Stat Surround / Callout Radial
category: product-hero
description: Product is the sun. Stats are the planets. Arrows make it scannable in
  under 2 seconds.
product_types:
- food
- beverage
- supplement
audience_fit:
- solution_aware
- product_aware
funnel_stage: consideration
aspect_ratios:
- '1:1'
tags:
