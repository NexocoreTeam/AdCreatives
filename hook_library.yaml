# Hook Library — Slot 7 of 11 in the Meta Ad Naming Taxonomy
#
# Master list of every hook (opening line) used in our ads. Each code (H##)
# is sequential and never reused, even if a hook is retired (set
# `status: Retired`).
#
# Filter all ads by a code (e.g. H04) to see how that specific hook
# performs across formats, personas, and angles.
#
# When a new hook is generated by `adc remix` or `adc brief`, the naming
# system fuzzy-matches against this library. If no match exists, the next
# available H## is assigned and the new hook is appended here.
#
# Schema mirrors the CSV source of truth in
# `meta_ads_naming_taxonomy - Hook Library` tab.

